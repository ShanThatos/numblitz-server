{% extends "admin/layout.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
    <form class="p-3" hx-post="/admin/login" >
        <input class="bg-neutral-200 border border-black rounded-sm mb-2" type="text" name="username" placeholder="Username" /> <br/>
        <input class="bg-neutral-200 border border-black rounded-sm mb-2" type="password" name="password" placeholder="Password" /> <br/>
        <button class="bg-green-400 px-4 py-1 rounded-lg hover:opacity-60" type="submit">Login</button>
    </form>
{% endblock %}
