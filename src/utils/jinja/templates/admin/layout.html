<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/htmx.org@1.9.6" integrity="sha384-FhXw7b6AlE/jyjlZH5iHa/tTe9EpJ1Y55RjcgPbjeWMskSxZt1v9qkxLJWNJaGni" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.24.2/ace.min.js" integrity="sha512-grCp52F5q+IJVuVwiXiMw+k0kb1b+La0syXiV946onkfBvuI9JBCFVvXZCWAiGvh9yoinMP9Ofchnc7RGwggXw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>

    <script>
        var katexRenderOptions = {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError : false
        }

        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, katexRenderOptions);
        });

        htmx.on("htmx:afterSwap", function(event) {
            renderMathInElement(event.target, katexRenderOptions);
        })
    </script>

    <title>
        {% block title %}{% endblock %}
    </title>
</head>
<body class="bg-[#FFF2F3] max-w-[100vw] overflow-x-hidden">
    {% block menu %}
        <a href="/admin" class="absolute left-5 top-5 bg-white p-3 shadow-lg rounded-lg hover:opacity-70 active:opacity-50">
            <h3 class="text-blue-700">Home</h3>
        </a>
    {% endblock %}
    {% block content %}{% endblock %}
</body>
</html>
