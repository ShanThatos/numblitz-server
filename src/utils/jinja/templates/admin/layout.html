    <script>
        var katexRenderOptions = {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError : false
        }

        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, katexRenderOptions);
        });

        htmx.on("htmx:afterSwap", function(event) {
            renderMathInElement(event.target, katexRenderOptions);
        })

        Quill.register({
            'modules/tableUI': quillTableUI.default
        }, true)

    </script>

    <title>
        {% block title %}{% endblock %}
    </title>

<body class="bg-[#FFF2F3] max-w-[100vw] overflow-x-hidden">
    {% block menu %}
        <div class="absolute left-5 top-5 bg-white shadow-lg rounded-lg text-blue-700 text-center">
            {% for href, text in [("/admin", "Home"), ("/admin/createmodel", "New"), ("/admin/listmodels", "All")] %}
                <a href="{{ href }}" class="p-3 block border-y border-neutral-200 hover:bg-neutral-100 hover:opacity-50 active:opacity-30">
                    <h3>{{ text }}</h3>
                </a>
            {% endfor %}
        </div>
        <!-- <a href="/admin" class="absolute left-5 top-5 bg-white p-3 shadow-lg rounded-lg hover:opacity-70 active:opacity-50">
            <h3 class="text-blue-700">Home</h3>
        </a> -->
    {% endblock %}
    {% block content %}{% endblock %}
</body>
