<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>

    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <title></title>
</head>
<body>
    <style>
        .katex {
            font-size: 1em;
        }
        .ql-container {
            font-size: 1.1em;
            font-family: KaTeX_Main, "Times New Roman", serif;
        }
    </style>
    <textarea id="quillContents" hidden>{{ contents or "[]" }}</textarea>
    <div id="quillView" style="padding: 10px;"></div>
    <script>
        const quillView = new Quill("#quillView", {
            modules: {
                toolbar: false
            },
            readOnly: true,
            theme: "bubble"
        });

        quillView.setContents(JSON.parse(document.getElementById("quillContents").innerHTML))

    </script>
</body>
</html>
